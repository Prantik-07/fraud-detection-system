name: Sync to Hugging Face
on:
  push:
    branches: [main]
  # allow manual trigger
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: git push --force https://Prantik-07:$HF_TOKEN@huggingface.co/spaces/Prantik-07/fraud-detection-dashboard main
